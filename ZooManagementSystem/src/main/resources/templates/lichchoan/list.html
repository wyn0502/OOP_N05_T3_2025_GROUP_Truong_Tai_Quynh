<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Quản lý Lịch Cho Ăn Đồng Bộ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <style>
    body { background-color: #f8f9fa; }
    .page-title { color:#2c3e50; font-weight:bold; text-align:center; }
    .employee-info { color: #dc3545; font-weight: bold; }
    .animal-info { color: #28a745; font-weight: bold; }
    .food-info { color: #6610f2; font-weight: bold; }
    .cage-info { font-size: 11px; color: #666; }
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .status-chua-thuc-hien { background: #fff3cd; color: #856404; }
    .status-da-thuc-hien { background: #d4edda; color: #155724; }
    .table th { background-color: #28a745 !important; color: white; }
    .table td { vertical-align: middle; }
    .alert-success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
    .alert-danger { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
  </style>
</head>
<body>
<div class="container mt-4">

  <a href="/greeting" class="btn btn-outline-primary mb-3">← Quay lại Dashboard</a>

  <h2 class="page-title mb-4">
    <i class="bi bi-calendar-check-fill"></i> Quản Lý Lịch Cho Ăn Đồng Bộ
  </h2>

  <!-- Flash Messages -->
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Admin Actions -->
  <div class="d-flex justify-content-center gap-2 mb-3"
       th:if="${session.loggedInUser != null and session.loggedInUser.role?.toLowerCase() == 'admin'}">
    <a href="/lichchoan/them" class="btn btn-success fw-bold">
      <i class="bi bi-plus-circle-fill"></i> Thêm lịch mới
    </a>
    <button onclick="location.reload()" class="btn btn-outline-primary fw-bold">
      <i class="bi bi-arrow-clockwise"></i> Làm mới
    </button>
  </div>

  <!-- Statistics Summary -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title" th:text="${#lists.size(danhSachLich)}">0</h5>
          <p class="card-text">Tổng số lịch</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title text-warning" id="pendingCount">0</h5>
          <p class="card-text">Chờ thực hiện</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title text-success" id="completedCount">0</h5>
          <p class="card-text">Đã hoàn thành</p>
        </div>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered text-center align-middle">
      <thead class="table-success">
        <tr>
          <th><i class="bi bi-hash"></i> Mã lịch</th>
          <th><i class="bi bi-clock"></i> Thời gian</th>
          <th><i class="bi bi-person-fill"></i> Nhân viên</th>
          <th><i class="bi bi-bug-fill"></i> Động vật</th>
          <th><i class="bi bi-egg-fried"></i> Thức ăn</th>
          <th><i class="bi bi-info-circle"></i> Trạng thái</th>
          <th th:if="${session.loggedInUser != null && session.loggedInUser.role?.toLowerCase() == 'admin'}" style="width: 120px;">
            <i class="bi bi-gear"></i> Hành động
          </th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="lich : ${danhSachLich}" th:data-status="${lich.trangThai}">
          <td><strong class="text-primary" th:text="${lich.maLich}"></strong></td>
          
          <td>
            <div class="fw-bold" th:text="${#temporals.format(lich.thoiGian, 'dd/MM/yyyy')}"></div>
            <small class="text-muted" th:text="${#temporals.format(lich.thoiGian, 'HH:mm')}"></small>
          </td>

          <td>
            <div class="employee-info" th:text="${lich.nhanVien?.fullname ?: lich.nhanVien}"></div>
            <small th:if="${lich.nhanVien?.username}" 
                   th:text="'@' + ${lich.nhanVien.username} + ' - ' + ${lich.nhanVien.role}"></small>
            <div class="cage-info" th:if="${lich.nhanVien?.chuong}" 
                 th:text="'🏠 Phụ trách: Chuồng ' + ${lich.nhanVien.chuong}"></div>
          </td>

          <td>
            <div class="animal-info" th:text="${lich.dongVat?.ten ?: lich.dongVat}"></div>
            <small th:if="${lich.dongVat?.loai}" 
                   th:text="${lich.dongVat.loai} + ' • ' + ${lich.dongVat.tuoi} + ' tuổi'"></small>
            <div class="cage-info" th:if="${lich.dongVat?.maChuong}" 
                 th:text="'🏠 Chuồng ' + ${lich.dongVat.maChuong}"></div>
            <div class="cage-info" th:if="${lich.dongVat?.sucKhoe}">
              <span th:if="${lich.dongVat.sucKhoe == 'Tốt'}" style="color: green;">✅ Tốt</span>
              <span th:if="${lich.dongVat.sucKhoe == 'Trung bình'}" style="color: orange;">⚠️ Trung bình</span>
              <span th:if="${lich.dongVat.sucKhoe == 'Yếu'}" style="color: red;">❌ Yếu</span>
            </div>
          </td>

          <td>
            <div class="food-info" th:text="${lich.thucAn}"></div>
            <small th:if="${lich.soLuong}" 
                   th:text="${lich.soLuong} + ' ' + ${lich.donVi ?: 'kg'}"></small>
          </td>

          <td>
            <span th:class="'status-badge status-' + ${#strings.toLowerCase(#strings.replace(lich.trangThai ?: 'CHUA_THUC_HIEN', '_', '-'))}"
                  th:text="${(lich.trangThai ?: 'CHUA_THUC_HIEN') == 'CHUA_THUC_HIEN' ? '⏳ Chờ thực hiện' : '✅ Hoàn thành'}">
            </span>
          </td>
     
          <td th:if="${session.loggedInUser != null and session.loggedInUser.role?.toLowerCase() == 'admin'}">
            <div class="btn-group-vertical btn-group-sm">
              <a th:href="@{/lichchoan/edit/{id}(id=${lich.maLich})}" 
                 class="btn btn-warning btn-sm" title="Chỉnh sửa">
                <i class="bi bi-pencil-square"></i>
              </a>
              <button type="button" class="btn btn-success btn-sm" 
                      th:if="${(lich.trangThai ?: 'CHUA_THUC_HIEN') == 'CHUA_THUC_HIEN'}"
                      onclick="updateStatus(this, 'DA_THUC_HIEN')"
                      th:data-schedule-id="${lich.maLich}"
                      title="Đánh dấu hoàn thành">
                <i class="bi bi-check-circle"></i>
              </button>
              <a th:href="@{/lichchoan/delete/{id}(id=${lich.maLich})}"
                 onclick="return confirm('⚠️ Bạn có chắc muốn xóa lịch này?\n\nMã: ' + this.dataset.code + '\nĐộng vật: ' + this.dataset.animal);"
                 th:data-code="${lich.maLich}"
                 th:data-animal="${lich.dongVat?.ten ?: lich.dongVat}"
                 class="btn btn-danger btn-sm" title="Xóa">
                <i class="bi bi-trash"></i>
              </a>
            </div>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(danhSachLich)}">
          <td th:colspan="${session.loggedInUser != null && session.loggedInUser.role?.toLowerCase() == 'admin' ? '7' : '6'}" 
              class="text-muted fst-italic py-5">
            <div class="h5">📭 Chưa có lịch cho ăn nào</div>
            <p th:if="${session.loggedInUser != null && session.loggedInUser.role?.toLowerCase() == 'admin'}">
              <a href="/lichchoan/them" class="btn btn-success btn-sm">
                <i class="bi bi-plus"></i> Tạo lịch đầu tiên
              </a>
            </p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Cập nhật thống kê
function updateStatistics() {
  const rows = document.querySelectorAll('tbody tr[data-status]');
  let pending = 0, completed = 0;
  
  rows.forEach(row => {
    const status = row.dataset.status || 'CHUA_THUC_HIEN';
    if (status === 'CHUA_THUC_HIEN') pending++;
    else if (status === 'DA_THUC_HIEN') completed++;
  });
  
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('completedCount').textContent = completed;
}

// Cập nhật trạng thái
function updateStatus(button, newStatus) {
  const scheduleId = button.dataset.scheduleId;
  const statusText = newStatus === 'DA_THUC_HIEN' ? 'hoàn thành' : 'chưa thực hiện';
  
  if (!confirm(`Đánh dấu lịch ${scheduleId} là ${statusText}?`)) return;
  
  // Disable button
  button.disabled = true;
  button.innerHTML = '<i class="bi bi-hourglass-split"></i>';
  
  fetch(`/lichchoan/api/update-status/${scheduleId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `status=${newStatus}`
  })
  .then(response => response.json())
  .then(data => {
    if (data.success === 'true') {
      // Show success message
      showAlert('success', '✅ Cập nhật trạng thái thành công');
      
      // Reload sau 1 giây
      setTimeout(() => {
        location.reload();
      }, 1000);
    } else {
      showAlert('danger', '❌ Lỗi: ' + data.message);
      button.disabled = false;
      button.innerHTML = '<i class="bi bi-check-circle"></i>';
    }
  })
  .catch(error => {
    console.error('Error:', error);
    showAlert('danger', '❌ Có lỗi xảy ra khi cập nhật trạng thái');
    button.disabled = false;
    button.innerHTML = '<i class="bi bi-check-circle"></i>';
  });
}

// Hiển thị alert message
function showAlert(type, message) {
  const alertDiv = document.createElement('div');
  alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
  alertDiv.innerHTML = `
    ${message}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  `;
  
  // Insert ở đầu container
  const container = document.querySelector('.container');
  const firstChild = container.firstElementChild;
  container.insertBefore(alertDiv, firstChild.nextSibling);
  
  // Auto dismiss sau 5 giây
  setTimeout(() => {
    if (alertDiv.parentNode) {
      alertDiv.remove();
    }
  }, 5000);
}

// Auto-refresh mỗi 30 giây (có thể điều chỉnh)
let autoRefreshInterval;

function startAutoRefresh() {
  autoRefreshInterval = setInterval(() => {
    if (!document.hidden) {
      console.log('🔄 Auto-refreshing data...');
      location.reload();
    }
  }, 30000); // 30 giây
}

function stopAutoRefresh() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
  }
}

// Khởi tạo
document.addEventListener('DOMContentLoaded', function() {
  updateStatistics();
  startAutoRefresh();
  
  // Dừng auto-refresh khi tab không active
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      stopAutoRefresh();
    } else {
      startAutoRefresh();
    }
  });
  
  console.log('✅ List page initialized with auto-refresh');
});

// Cleanup khi unload
window.addEventListener('beforeunload', function() {
  stopAutoRefresh();
});
</script>
</body>
</html>
