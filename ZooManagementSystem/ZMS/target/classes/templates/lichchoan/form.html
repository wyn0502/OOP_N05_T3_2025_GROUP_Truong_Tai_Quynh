<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Lịch Cho Ăn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-5">
        <h2 class="text-center text-primary mb-4">Thêm / Sửa Lịch Cho Ăn</h2>

        <form th:action="@{/lichchoan/save}" method="post" class="border p-4 rounded bg-light">

            <div class="mb-3">
                <label for="id" class="form-label">Mã lịch (ID)</label>
                <input type="text" class="form-control" id="id" name="id" th:value="${lich.id}" readonly>
            </div>

            <div class="mb-3">
                <label for="tenDongVat" class="form-label">Tên động vật</label>
                <input type="text" class="form-control" id="tenDongVat" name="tenDongVat" th:value="${lich.tenDongVat}" required>
            </div>

            <div class="mb-3">
                <label for="ngayGioChoAn" class="form-label">Ngày giờ cho ăn</label>
                <input type="datetime-local" class="form-control" id="ngayGioChoAn" name="ngayGioChoAn" th:value="${lich.ngayGioChoAn}" required>
            </div>

            <div class="mb-3">
                <label for="thucAn" class="form-label">Thức ăn</label>
                <input type="text" class="form-control" id="thucAn" name="thucAn" th:value="${lich.thucAn}" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> Lưu
                </button>
                <a href="/lichchoan" class="btn btn-secondary ms-2">
                    <i class="bi bi-arrow-left-circle"></i> Quay lại
                </a>
            </div>

        </form>
    </div>

</body>

</html>
